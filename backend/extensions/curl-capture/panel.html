<!DOCTYPE html>
<html>
<head>
  <title>cURL Capture Panel</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #1e1e1e;
      color: #d4d4d4;
      margin: 0;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 16px 0;
      color: #4fc3f7;
    }
    .curl-container {
      background: #2d2d2d;
      border: 1px solid #3d3d3d;
      border-radius: 4px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .curl-url {
      font-size: 12px;
      color: #9cdcfe;
      margin-bottom: 8px;
      word-break: break-all;
    }
    .curl-command {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 11px;
      background: #1e1e1e;
      padding: 12px;
      border-radius: 4px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 300px;
      overflow-y: auto;
      color: #ce9178;
    }
    .buttons {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    button {
      background: #0e639c;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover {
      background: #1177bb;
    }
    button.secondary {
      background: #3d3d3d;
    }
    button.secondary:hover {
      background: #4d4d4d;
    }
    .status {
      font-size: 11px;
      color: #6a9955;
      margin-top: 8px;
    }
    .empty {
      text-align: center;
      padding: 40px;
      color: #808080;
    }
    .timestamp {
      font-size: 10px;
      color: #808080;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>🔗 cURL Capture</h1>
  
  <div id="content">
    <div class="empty">
      <p>Waiting for LINE API requests...</p>
      <p style="font-size: 11px;">Navigate to LINE Chrome Extension and trigger a message fetch</p>
    </div>
  </div>
  
  <div class="buttons">
    <button id="copyBtn" style="display: none;">📋 Copy cURL</button>
    <button id="refreshBtn" class="secondary">🔄 Refresh</button>
    <button id="clearBtn" class="secondary">🗑️ Clear</button>
  </div>
  
  <div id="status" class="status"></div>

  <script src="panel.js"></script>
</body>
</html>
