<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - LINE OA Middleware</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-6 offset-md-3">
                <div class="card border-danger shadow">
                    <div class="card-header bg-danger text-white">
                        <h4 class="mb-0">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            System Error
                        </h4>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-danger">
                            <strong>Error:</strong> {{ message if message else 'Account manager not initialized' }}
                        </div>
                        <p class="text-muted">
                            The system encountered an error while processing your request.
                        </p>
                        <hr>
                        <div class="d-flex justify-content-between">
                            <a href="/admin" class="btn btn-primary">
                                <i class="fas fa-home me-2"></i>
                                Back to Dashboard
                            </a>
                            <button onclick="window.location.reload()" class="btn btn-outline-secondary">
                                <i class="fas fa-redo me-2"></i>
                                Retry
                            </button>
                        </div>
                    </div>
                    <div class="card-footer text-muted text-center">
                        <small>If this problem persists, please check the system configuration.</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
