{% extends "base.html" %}

{% block title %}Chat with {{ user_id[:10] }} - LINE OA{% endblock %}

{% block content %}
<div class="container-fluid py-4">
  <div class="row">
    <div class="col-12 col-md-8 mx-auto">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h5 class="mb-0">Chat with {{ user_id[:10] }}</h5>
          <div>
            <button class="btn btn-sm btn-outline-primary me-2" onclick="refreshChat()">Refresh</button>
            <a href="/admin/chat-history" class="btn btn-sm btn-outline-secondary">Back</a>
          </div>
        </div>
        <!-- ส่วนแสดงข้อความ -->
        <div class="card-body" id="chat-container" style="height:60vh; overflow-y:auto;">
          <div id="loading" class="text-center py-5 text-muted">Loading chat history...</div>
        </div>
        <!-- ช่องพิมพ์ข้อความ -->
        <div class="card-footer d-flex">
          <input id="message-input" type="text" class="form-control me-2" placeholder="Type your message…">
          <button class="btn btn-primary" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const userId = "{{ user_id }}";
let chatHistory = [];

// โหลดประวัติแชท
async function loadChatHistory() {
  try {
    const response = await fetch(`/admin/api/chat-history/${userId}`);
    const data = await response.json();
    if (data.status === 'success') {
      chatHistory = data.chat_history;
      renderChat();
    } else {
      showNotification(data.message || 'Error loading chat history', 'error');
    }
  } catch (error) {
    console.error('Error loading chat:', error);
    showNotification('Error loading chat history', 'error');
  }
}

// แสดงข้อความบนหน้า
function renderChat() {
  const container = document.getElementById('chat-container');
  if (!chatHistory.length) {
    container.innerHTML = '<div class="text-center py-5 text-muted">No messages yet</div>';
    return;
    }
  let html = '';
  chatHistory.forEach(msg => {
    const incoming = msg.direction === 'in';
    const time = msg.created_at ? new Date(msg.created_at).toLocaleString() : '';
    html += `
    <div class="message ${incoming ? 'incoming' : 'outgoing'} mb-3 d-flex ${incoming ? 'justify-content-start' : 'justify-content-end'}">
      <div class="message-bubble px-3 py-2 rounded ${incoming ? 'bg-light' : 'bg-primary text-white'}">
        <div class="message-sender small fw-bold mb-1">${incoming ? 'User' : (msg.sender || 'Bot')}</div>
        <div class="message-text">${msg.message_text || '[No text]'}</div>
        <div class="message-time small text-muted mt-1">${time}</div>
      </div>
    </div>`;
  });
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

// ส่งข้อความไปยังผู้ใช้
async function sendMessage() {
  const input = document.getElementById('message-input');
  const message = input.value.trim();
  if (!message) return;
  try {
    const response = await fetch('/admin/users/send-message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id: userId,     // ส่งเป็นค่าเดียวไม่ใช่อาร์เรย์
        message: message
      })
    });
    const data = await response.json();
    if (data.status === 'success') {
      showNotification('Message sent successfully', 'success');
      input.value = '';
      setTimeout(loadChatHistory, 1000);
    } else {
      showNotification(data.message || 'Failed to send message', 'error');
    }
  } catch (error) {
    console.error('Error sending message:', error);
    showNotification('Error sending message', 'error');
  }
}

// รีเฟรชประวัติแชท
function refreshChat() {
  loadChatHistory();
  showNotification('Chat refreshed', 'info');
}

// เรียกโหลดประวัติอัตโนมัติทุก 10 วินาที
setInterval(loadChatHistory, 10000);
document.addEventListener('DOMContentLoaded', loadChatHistory);
document.getElementById('message-input').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    sendMessage();
  }
});
</script>
{% endblock %}
