<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>จัดการ Forwarding Webhooks</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { margin-bottom: 10px; }
        nav a { margin-right: 15px; }
        table { border-collapse: collapse; width: 100%; }
        table, th, td { border: 1px solid #ccc; }
        th, td { padding: 8px; text-align: left; }
        th { background-color: #f5f5f5; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; }
        button { margin-top: 10px; padding: 8px 12px; }
    </style>
</head>
<body>
    <h1>🔀 จัดการ Forwarding Webhooks</h1>
    <nav>
        <a href="/admin">🏠 กลับไปหน้าแดชบอร์ด</a>
        <a href="/admin/chat">📝 ดูประวัติการแชท</a>
        <a href="/admin/settings">⚙️ ตั้งค่าระบบ</a>
    </nav>
    <h2>Endpoints ปัจจุบัน</h2>
    <table>
        <tr><th>ID</th><th>URL</th><th>ลบ</th></tr>
        {% for ep in endpoints %}
        <tr>
            <td>{{ ep.id }}</td>
            <td>{{ ep.url }}</td>
            <td>
                <button onclick="deleteEndpoint({{ ep.id }})">🗑️ ลบ</button>
            </td>
        </tr>
        {% endfor %}
        {% if endpoints|length == 0 %}
        <tr><td colspan="3">ไม่มี endpoint</td></tr>
        {% endif %}
    </table>

    <h2>เพิ่ม Endpoint ใหม่</h2>
    <form onsubmit="return addEndpoint(event)">
        <input type="text" id="new-endpoint-url" placeholder="https://example.com/webhook" />
        <button type="submit">➕ เพิ่ม</button>
    </form>

    <script>
    function addEndpoint(event) {
        event.preventDefault();
        const url = document.getElementById('new-endpoint-url').value.trim();
        if (!url) {
            alert('กรุณาใส่ URL');
            return false;
        }
        fetch('/admin/forwarding/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: url })
        }).then(resp => {
            if (resp.redirected) {
                window.location.href = resp.url;
            } else {
                location.reload();
            }
        }).catch(err => {
            console.error(err);
            alert('เกิดข้อผิดพลาด');
        });
        return false;
    }
    function deleteEndpoint(id) {
        if (!confirm('ต้องการลบ endpoint นี้หรือไม่?')) return;
        fetch('/admin/forwarding/delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id })
        }).then(resp => {
            if (resp.redirected) {
                window.location.href = resp.url;
            } else {
                location.reload();
            }
        }).catch(err => {
            console.error(err);
            alert('เกิดข้อผิดพลาด');
        });
    }
    </script>
</body>
</html>
