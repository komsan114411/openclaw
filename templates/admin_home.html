<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Admin1 Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { margin-bottom: 10px; }
        nav a { margin-right: 15px; }
        table { border-collapse: collapse; width: 100%; max-width: 600px; margin-top: 20px; }
        table, th, td { border: 1px solid #ccc; }
        th, td { padding: 8px; text-align: left; }
        th { background-color: #f5f5f5; }
    </style>
</head>
<body>
    <h1>Admin Dashboard</h1>
    <p>
        <strong>Webhook URL สำหรับ LINE:</strong>
        <code>{{ webhook_url }}</code>
    </p>
    <p>
        <strong>Webhook URL สำหรับบอทตรวจสลิป:</strong>
        <code>{{ slip_webhook_url }}</code>
    </p>
    <nav>
        <a href="/admin/chat">📝 ดูประวัติการแชท</a>
        <a href="/admin/settings">⚙️ ตั้งค่าระบบ</a>
        <a href="/admin/forwarding">🔀 จัดการ Forwarding Webhooks</a>
    </nav>
    <h2>การตั้งค่าปัจจุบัน</h2>
    <table>
        <tr><th>คีย์</th><th>ค่า</th></tr>
        {% for key, value in config.items() %}
        <tr>
            <td>{{ key }}</td>
            <td>{{ value if value else '—' }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
