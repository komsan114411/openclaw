<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - LINE OA Middleware</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .status-indicator { 
            width: 12px; 
            height: 12px; 
            border-radius: 50%; 
            display: inline-block; 
            margin-right: 8px; 
        }
        .status-online { background-color: #28a745; }
        .status-offline { background-color: #dc3545; }
        .api-status-card { transition: all 0.3s ease; }
        .api-status-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/admin">
                <i class="fas fa-cogs me-2"></i>LINE OA Admin Dashboard
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/admin/debug">
                    <i class="fas fa-bug me-1"></i>Debug Console
                </a>
                <a class="nav-link" href="/admin/settings">
                    <i class="fas fa-cog me-1"></i>Settings
                </a>
                <a class="nav-link" href="/health" target="_blank">
                    <i class="fas fa-heartbeat me-1"></i>Health
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- System Status Overview -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5><i class="fas fa-tachometer-alt me-2"></i>System Status Overview</h5>
                        <button class="btn btn-sm btn-outline-primary" onclick="refreshAllStatus()" id="refreshBtn">
                            <i class="fas fa-sync me-1"></i>Refresh All
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="row" id="systemStatusOverview">
                            <div class="col-md-3">
                                <div class="text-center">
                                    <div class="h2 text-primary" id="systemStatus">
                                        <div class="spinner-border" role="status"></div>
                                    </div>
                                    <div class="text-muted">System Status</div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="text-center">
                                    <div class="h2 text-success" id="apiCount">
                                        <div class="spinner-border" role="status"></div>
                                    </div>
                                    <div class="text-muted">APIs Ready</div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="text-center">
                                    <div class="h2 text-info">{{ total_chat_history or 0 }}</div>
                                    <div class="text-muted">Total Messages</div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="text-center">
                                    <div class="h2 text-warning" id="activeConnections">0</div>
                                    <div class="text-muted">Active Connections</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- API Status Cards -->
        <div class="row mb-4">
            <!-- Thunder API -->
            <div class="col-md-4">
                <div class="card api-status-card">
                    <div class="card-header bg-warning text-dark">
                        <h6><i class="fas fa-bolt me-2"></i>Thunder API</h6>
                    </div>
                    <div class="card-body" id="thunderApiStatus">
                        <div class="text-center">
                            <div class="spinner-border spinner-border-sm text-warning" role="status"></div>
                            <span class="ms-2">กำลังตรวจสอบ...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- KBank API -->
            <div class="col-md-4">
                <div class="card api-status-card">
                    <div class="card-header bg-primary text-white">
                        <h6><i class="fas fa-university me-2"></i>KBank API</h6>
                    </div>
                    <div class="card-body" id="kbankApiStatus">
                        <div class="text-center">
                            <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                            <span class="ms-2">กำลังตรวจสอบ...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- LINE API -->
            <div class="col-md-4">
                <div class="card api-status-card">
                    <div class="card-header bg-success text-white">
                        <h6><i class="fab fa-line me-2"></i>LINE API</h6>
                    </div>
                    <div class="card-body" id="lineApiStatus">
                        <div class="text-center">
                            <div class="spinner-border spinner-border-sm text-success" role="status"></div>
                            <span class="ms-2">กำลังตรวจสอบ...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h6><i class="fas fa-bolt me-2"></i>Quick Actions</h6>
                    </div>
                    <div class="card-body">
                        <div class="d-flex gap-2 flex-wrap">
                            <button class="btn btn-outline-success" onclick="toggleSlipSystem()">
                                <i class="fas fa-toggle-on me-1"></i>Toggle Slip System
                            </button>
                            <button class="btn btn-outline-primary" onclick="resetAPIFailures()">
                                <i class="fas fa-redo me-1"></i>Reset API Failures
                            </button>
                            <button class="btn btn-outline-info" onclick="testKBankSandbox()">
                                <i class="fas fa-university me-1"></i>Test KBank Sandbox
                            </button>
                            <a href="/admin/settings" class="btn btn-outline-secondary">
                                <i class="fas fa-cog me-1"></i>Settings
                            </a>
                            <a href="/admin/debug" class="btn btn-outline-dark">
                                <i class="fas fa-bug me-1"></i>Debug Console
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            refreshAllStatus();
            setInterval(refreshAllStatus, 30000);
        });

        async function refreshAllStatus() {
            try {
                const response = await fetch('/admin/api-status');
                const data = await response.json();
                
                // Update system status
                const systemReady = data.system_status?.slip_system_ready && data.system_status?.line_ready;
                document.getElementById('systemStatus').innerHTML = systemReady ? 
                    '<i class="fas fa-check-circle text-success"></i>' : 
                    '<i class="fas fa-exclamation-circle text-danger"></i>';
                
                // Update API count
                const connectedAPIs = [
                    data.thunder?.connected, 
                    data.kbank?.connected, 
                    data.line?.connected
                ].filter(Boolean).length;
                document.getElementById('apiCount').textContent = `${connectedAPIs}/3`;
                
                // Update API status cards
                updateAPIStatusCard('thunderApiStatus', data.thunder);
                updateAPIStatusCard('kbankApiStatus', data.kbank);
                updateAPIStatusCard('lineApiStatus', data.line, data.line?.bot_name);
                
            } catch (error) {
                console.error('Failed to refresh status:', error);
            }
        }

        function updateAPIStatusCard(elementId, apiData, extraInfo = null) {
            const element = document.getElementById(elementId);
            if (!apiData) {
                element.innerHTML = '<div class="text-center text-muted">No data</div>';
                return;
            }
            
            const statusColor = apiData.connected ? 'success' : apiData.configured ? 'warning' : 'danger';
            const statusText = apiData.connected ? 'Connected' : apiData.configured ? 'Configured' : 'Not Configured';
            
            element.innerHTML = `
                <div class="d-flex justify-content-between mb-2">
                    <span>Status:</span>
                    <span class="badge bg-${statusColor}">${statusText}</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span>Enabled:</span>
                    <span class="badge ${apiData.enabled ? 'bg-primary' : 'bg-secondary'}">
                        ${apiData.enabled ? 'Yes' : 'No'}
                    </span>
                </div>
                ${extraInfo ? `<small class="text-muted">${extraInfo}</small>` : `<small class="text-muted">Failures: ${apiData.recent_failures || 0}</small>`}
            `;
        }

        async function toggleSlipSystem() {
            try {
                const response = await fetch('/admin/toggle-slip-system', { method: 'POST' });
                const result = await response.json();
                alert(result.message);
                refreshAllStatus();
            } catch (error) {
                alert('Failed to toggle slip system');
            }
        }

        async function resetAPIFailures() {
            try {
                const response = await fetch('/admin/reset-failures', { method: 'POST' });
                const result = await response.json();
                alert(result.message);
                refreshAllStatus();
            } catch (error) {
                alert('Failed to reset API failures');
            }
        }

        async function testKBankSandbox() {
            try {
                const response = await fetch('/admin/test-kbank-sandbox', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        consumer_id: 'suDxvMLTLYsQwL1R0L9UL1m8Ceoibmcr',
                        consumer_secret: 'goOfPtGLoGxYP3DG',
                        bank_id: '004',
                        trans_ref: 'TEST123456789'
                    })
                });
                const result = await response.json();
                alert(`KBank Sandbox Test: ${result.message}`);
                console.log('KBank Test Result:', result);
            } catch (error) {
                alert('Failed to test KBank Sandbox');
            }
        }
    </script>
</body>
</html>
