<script>
function updateNavbarStatus(connected) {
    const statusElement = document.getElementById('navbar-connection-status');
    if (statusElement) {
        if (connected) {
            statusElement.className = 'badge bg-success';
            statusElement.innerHTML = '<i class="fas fa-circle me-1"></i>Connected';
        } else {
            statusElement.className = 'badge bg-danger';
            statusElement.innerHTML = '<i class="fas fa-circle me-1"></i>Disconnected';
        }
    }
}
</script>
