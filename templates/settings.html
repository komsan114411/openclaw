{% extends "base.html" %}

{% block title %}Settings - LINE OA Middleware{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 fw-bold text-dark">
        <i class="fas fa-cogs me-2 text-primary"></i>
        Global Settings
    </h1>
    <button class="btn btn-success" onclick="saveSettings()">
        <i class="fas fa-save me-1"></i> Save Settings
    </button>
</div>

<form id="settings-form">
    <!-- System Messages -->
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">
                <i class="fas fa-comment-alt me-2"></i>
                System Messages
            </h5>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label">AI Disabled Message</label>
                <textarea class="form-control" id="ai_disabled_message" rows="2">{{ config.ai_disabled_message or 'ขออภัย ระบบ AI ถูกปิดการใช้งานชั่วคราว' }}</textarea>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Slip System Disabled Message</label>
                <textarea class="form-control" id="slip_disabled_message" rows="2">{{ config.slip_disabled_message or 'ขออภัย ระบบตรวจสอบสลิปถูกปิดการใช้งานชั่วคราว' }}</textarea>
            </div>
            
            <div class="mb-3">
                <label class="form-label">System Disabled Message</label>
                <textarea class="form-control" id="system_disabled_message" rows="2">{{ config.system_disabled_message or 'ขออภัย ระบบกำลังปิดปรับปรุง กรุณาติดต่อใหม่ภายหลัง' }}</textarea>
            </div>
        </div>
    </div>
    
    <!-- Global Features -->
    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">
                <i class="fas fa-toggle-on me-2"></i>
                Global Features
            </h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="global_ai_enabled" {% if config.global_ai_enabled %}checked{% endif %}>
                        <label class="form-check-label" for="global_ai_enabled">
                            Enable AI for all accounts
                        </label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="global_slip_enabled" {% if config.global_slip_enabled %}checked{% endif %}>
                        <label class="form-check-label" for="global_slip_enabled">
                            Enable Slip Verification for all accounts
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</form>

<script>
async function saveSettings() {
    const data = {
        ai_disabled_message: document.getElementById('ai_disabled_message').value,
        slip_disabled_message: document.getElementById('slip_disabled_message').value,
        system_disabled_message: document.getElementById('system_disabled_message').value,
        global_ai_enabled: document.getElementById('global_ai_enabled').checked,
        global_slip_enabled: document.getElementById('global_slip_enabled').checked
    };
    
    try {
        const response = await fetch('/admin/settings/update', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        if (result.status === 'success') {
            showNotification('Settings saved successfully', 'success');
        } else {
            showNotification('Failed to save settings', 'error');
        }
    } catch (error) {
        showNotification('Error saving settings', 'error');
    }
}
</script>
{% endblock %}
