<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งค่าระบบ - LINE OA Middleware</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/admin">
                <i class="fas fa-robot me-2"></i>LINE OA Middleware
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/admin">
                    <i class="fas fa-arrow-left me-1"></i>กลับหน้าหลัก
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="mb-4">
            <i class="fas fa-cog me-2"></i>ตั้งค่าระบบ
        </h2>

        <form id="settingsForm">
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5><i class="fab fa-line me-2"></i>LINE Official Account</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="line_channel_secret" class="form-label">Channel Secret</label>
                        <input type="text" class="form-control" id="line_channel_secret" name="line_channel_secret" value="{{ config.get('line_channel_secret', '') }}">
                    </div>
                    <div class="mb-3">
                        <label for="line_channel_access_token" class="form-label">Channel Access Token</label>
                        <input type="text" class="form-control" id="line_channel_access_token" name="line_channel_access_token" value="{{ config.get('line_channel_access_token', '') }}">
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-success text-white">
                    <h5><i class="fas fa-receipt me-2"></i>ระบบตรวจสอบสลิป</h5>
                </div>
                <div class="card-body">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="slip_enabled" name="slip_enabled" {{ 'checked' if config.get('slip_enabled') }}>
                        <label class="form-check-label" for="slip_enabled">เปิดใช้งานระบบตรวจสอบสลิป</label>
                    </div>
                    <div class="mb-3">
                        <label for="thunder_api_token" class="form-label">Thunder API Token</label>
                        <input type="text" class="form-control" id="thunder_api_token" name="thunder_api_token" value="{{ config.get('thunder_api_token', '') }}">
                    </div>
                    <div class="mb-3">
                        <label for="kbank_consumer_id" class="form-label">KBank Consumer ID</label>
                        <input type="text" class="form-control" id="kbank_consumer_id" name="kbank_consumer_id" value="{{ config.get('kbank_consumer_id', '') }}">
                    </div>
                    <div class="mb-3">
                        <label for="kbank_consumer_secret" class="form-label">KBank Consumer Secret</label>
                        <input type="text" class="form-control" id="kbank_consumer_secret" name="kbank_consumer_secret" value="{{ config.get('kbank_consumer_secret', '') }}">
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-header bg-warning text-dark">
                    <h5><i class="fas fa-brain me-2"></i>AI Chatbot</h5>
                </div>
                <div class="card-body">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="ai_enabled" name="ai_enabled" {{ 'checked' if config.get('ai_enabled') }}>
                        <label class="form-check-label" for="ai_enabled">เปิดใช้งาน AI Chatbot</label>
                    </div>
                    <div class="mb-3">
                        <label for="openai_api_key" class="form-label">OpenAI API Key</label>
                        <input type="text" class="form-control" id="openai_api_key" name="openai_api_key" value="{{ config.get('openai_api_key', '') }}">
                    </div>
                    <div class="mb-3">
                        <label for="ai_prompt" class="form-label">AI Prompt</label>
                        <textarea class="form-control" id="ai_prompt" name="ai_prompt" rows="3">{{ config.get('ai_prompt', '') }}</textarea>
                    </div>
                </div>
            </div>

            <div class="text-end">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-1"></i>บันทึกการตั้งค่า
                </button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('settingsForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = {};
            for (let [key, value] of formData.entries()) {
                data[key] = value;
            }
            
            data['ai_enabled'] = document.getElementById('ai_enabled').checked;
            data['slip_enabled'] = document.getElementById('slip_enabled').checked;
            
            try {
                const response = await fetch('/admin/settings/update', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                alert(result.message);
            } catch (error) {
                alert('เกิดข้อผิดพลาดในการบันทึกการตั้งค่า');
            }
        });
    </script>
</body>
</html>
