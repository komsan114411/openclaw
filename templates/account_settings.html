{% extends "base.html" %}

{% block title %}Account Settings - {{ account.display_name }}{% endblock %}

{% block content %}
<div class="card mb-4">
    <div class="card-header">
        <h5 class="mb-0">
            <i class="fas fa-power-off me-2"></i>
            System Disabled Messages
        </h5>
    </div>
    <div class="card-body">
        <div class="mb-3">
            <label class="form-label">ข้อความเมื่อระบบ AI ถูกปิด</label>
            <textarea class="form-control" name="ai_disabled_message" rows="2">{{ account.ai_disabled_message or 'ขออภัย ระบบ AI ถูกปิดการใช้งานชั่วคราว' }}</textarea>
        </div>
        
        <div class="mb-3">
            <label class="form-label">ข้อความเมื่อระบบตรวจสลิปถูกปิด</label>
            <textarea class="form-control" name="slip_disabled_message" rows="2">{{ account.slip_disabled_message or 'ขออภัย ระบบตรวจสอบสลิปถูกปิดการใช้งานชั่วคราว' }}</textarea>
        </div>
        
        <div class="mb-3">
            <label class="form-label">ข้อความเมื่อระบบทั้งหมดถูกปิด</label>
            <textarea class="form-control" name="system_disabled_message" rows="2">{{ account.system_disabled_message or 'ขออภัย ระบบกำลังปิดปรับปรุง กรุณาติดต่อใหม่ภายหลัง' }}</textarea>
        </div>
    </div>
</div>
{% endblock %}
