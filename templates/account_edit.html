{% extends "base.html" %}

{% block title %}Edit Account - {{ account.display_name }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 fw-bold text-dark">
        <i class="fab fa-line me-2 text-success"></i>
        Edit LINE Account
    </h1>
    <a href="/admin/accounts" class="btn btn-outline-secondary">
        <i class="fas fa-arrow-left me-1"></i> Back to Accounts
    </a>
</div>

<form id="edit-account-form">
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">Account Information</h5>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label">Account ID</label>
                <input type="text" class="form-control" value="{{ account.id }}" readonly>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Display Name</label>
                <input type="text" class="form-control" name="display_name" 
                       value="{{ account.display_name }}" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Webhook URL</label>
                <div class="input-group">
                    <input type="text" class="form-control" 
                           value="{{ request.url.scheme }}://{{ request.url.netloc }}/line/{{ account.id }}/webhook" 
                           readonly>
                    <button class="btn btn-outline-secondary" type="button" 
                            onclick="copyToClipboard(this.previousElementSibling)">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">LINE Configuration</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Channel Secret</label>
                        <input type="password" class="form-control" name="channel_secret" 
                               value="{{ account.channel_secret }}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Channel Access Token</label>
                        <input type="password" class="form-control" name="channel_access_token" 
                               value="{{ account.channel_access_token }}">
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">API Keys</h5>
        </div>
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label">Thunder API Token</label>
                <input type="password" class="form-control" name="thunder_api_token" 
                       value="{{ account.thunder_api_token }}">
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">KBank Consumer ID</label>
                        <input type="text" class="form-control" name="kbank_consumer_id" 
                               value="{{ account.kbank_consumer_id }}">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">KBank Consumer Secret</label>
                        <input type="password" class="form-control" name="kbank_consumer_secret" 
                               value="{{ account.kbank_consumer_secret }}">
                    </div>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">OpenAI API Key</label>
                <input type="password" class="form-control" name="openai_api_key" 
                       value="{{ account.openai_api_key }}">
            </div>
        </div>
    </div>
    
    <div class="card mb-4">
        <div class="card-header">
            <h5 class="mb-0">Features</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="ai_enabled" 
                               {% if account.ai_enabled %}checked{% endif %}>
                        <label class="form-check-label">AI Chat</label>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="slip_enabled" 
                               {% if account.slip_enabled %}checked{% endif %}>
                        <label class="form-check-label">Slip Verification</label>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="thunder_enabled" 
                               {% if account.thunder_enabled %}checked{% endif %}>
                        <label class="form-check-label">Thunder API</label>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="kbank_enabled" 
                               {% if account.kbank_enabled %}checked{% endif %}>
                        <label class="form-check-label">KBank API</label>
                    </div>
                </div>
            </div>
            
            <div class="mt-3">
                <label class="form-label">AI Prompt</label>
                <textarea class="form-control" name="ai_prompt" rows="3">{{ account.ai_prompt }}</textarea>
            </div>
        </div>
    </div>
    
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-save me-1"></i> Save Changes
        </button>
        <button type="button" class="btn btn-danger" onclick="deleteAccount()">
            <i class="fas fa-trash me-1"></i> Delete Account
        </button>
    </div>
</form>

<script>
function copyToClipboard(input) {
    input.select();
    document.execCommand('copy');
    showNotification('Copied to clipboard!', 'success');
}

document.getElementById('edit-account-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const formData = new FormData(e.target);
    const data = {};
    
    for (let [key, value] of formData.entries()) {
        if (e.target.elements[key].type === 'checkbox') {
            data[key] = e.target.elements[key].checked;
        } else {
            data[key] = value;
        }
    }
    
    try {
        const response = await fetch(`/admin/accounts/{{ account.id }}/update`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (result.status === 'success') {
            showNotification('Account updated successfully', 'success');
        } else {
            showNotification('Failed to update account', 'error');
        }
    } catch (error) {
        showNotification('Error updating account', 'error');
    }
});

async function deleteAccount() {
    if (!confirm('Are you sure you want to delete this account? This action cannot be undone.')) {
        return;
    }
    
    try {
        const response = await fetch(`/admin/accounts/{{ account.id }}`, {
            method: 'DELETE'
        });
        
        const result = await response.json();
        
        if (result.status === 'success') {
            showNotification('Account deleted', 'success');
            setTimeout(() => window.location.href = '/admin/accounts', 1000);
        }
    } catch (error) {
        showNotification('Error deleting account', 'error');
    }
}
</script>
{% endblock %}
