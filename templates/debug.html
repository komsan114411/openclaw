<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug API - LINE OA Middleware</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/admin">
                <i class="fas fa-bug me-2"></i>API Debug Console
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/admin">
                    <i class="fas fa-arrow-left me-1"></i>กลับหน้าหลัก
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-vial me-2"></i>ทดสอบ Thunder API</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="thunderToken" class="form-label">API Token</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="thunderToken" placeholder="Loading...">
                                <button class="btn btn-outline-secondary" type="button" onclick="loadThunderConfig()">
                                    <i class="fas fa-sync"></i>
                                </button>
                            </div>
                            <small class="text-muted">Auto-loaded from config</small>
                        </div>
                        <div class="mb-3">
                            <label for="thunderFile" class="form-label">รูปสลิป</label>
                            <input type="file" class="form-control" id="thunderFile" accept="image/*">
                        </div>
                        <button class="btn btn-warning w-100" onclick="testThunderAPI()">
                            <i class="fas fa-bolt me-1"></i>ทดสอบ Thunder API
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-university me-2"></i>ทดสอบ KBank API</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="kbankConsumerId" class="form-label">Consumer ID</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="kbankConsumerId" placeholder="Loading...">
                                <button class="btn btn-outline-secondary" type="button" onclick="loadKBankConfig()">
                                    <i class="fas fa-sync"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="kbankConsumerSecret" class="form-label">Consumer Secret</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="kbankConsumerSecret" placeholder="Loading...">
                                <button class="btn btn-outline-secondary" type="button" onclick="loadKBankConfig()">
                                    <i class="fas fa-sync"></i>
                                </button>
                            </div>
                            <small class="text-muted">Auto-loaded from config</small>
                        </div>
                        
                        <!-- ปุ่มทดสอบ OAuth -->
                        <button class="btn btn-info w-100 mb-2" onclick="testKBankOAuth()">
                            <i class="fas fa-key me-1"></i>ทดสอบ OAuth Token
                        </button>
                        
                        <div class="mb-3">
                            <label for="kbankBankId" class="form-label">Bank ID</label>
                            <input type="text" class="form-control" id="kbankBankId" placeholder="004" value="004">
                        </div>
                        <div class="mb-3">
                            <label for="kbankTransRef" class="form-label">Transaction Reference</label>
                            <input type="text" class="form-control" id="kbankTransRef" placeholder="Transaction Reference">
                        </div>
                        <button class="btn btn-primary w-100" onclick="testKBankAPI()">
                            <i class="fas fa-university me-1"></i>ทดสอบ KBank API
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5><i class="fas fa-info-circle me-2"></i>API Status</h5>
                    </div>
                    <div class="card-body" id="apiStatusCard">
                        <div class="text-center">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-2">กำลังโหลดสถานะ API...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5><i class="fas fa-terminal me-2"></i>Debug Log</h5>
                        <div>
                            <button class="btn btn-sm btn-outline-success me-2" onclick="loadAllConfigs()">
                                <i class="fas fa-sync me-1"></i>Reload All
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="clearLog()">
                                <i class="fas fa-trash me-1"></i>Clear
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <pre id="debugLog" style="max-height: 400px; overflow-y: auto; background-color: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 5px;">
Ready for testing...
                        </pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let configData = {};

        document.addEventListener('DOMContentLoaded', function() {
            log('Debug Console initialized', 'info');
            updateAPIStatus();
            loadAllConfigs();
            setInterval(updateAPIStatus, 10000);
        });

        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString('th-TH');
            const logElement = document.getElementById('debugLog');
            const icon = type === 'error' ? '❌' : type === 'success' ? '✅' : type === 'warning' ? '⚠️' : 'ℹ️';
            logElement.textContent += `\n[${timestamp}] ${icon} ${message}`;
            logElement.scrollTop = logElement.scrollHeight;
        }

        function clearLog() {
            document.getElementById('debugLog').textContent = 'Log cleared...';
        }

        async function loadAllConfigs() {
            log('Loading all configurations...', 'info');
            await loadConfigValues();
            await loadThunderConfig();
            await loadKBankConfig();
            log('All configurations loaded', 'success');
        }

        async function loadConfigValues() {
            try {
                const response = await fetch('/admin/debug-config');
                const data = await response.json();
                configData = data;
                
                log('Config metadata loaded from backend', 'success');
                log(`Thunder Token: ${data.config_values?.thunder_token ? 'SET' : 'NOT SET'}`);
                log(`KBank Consumer ID: ${data.config_values?.kbank_consumer_id ? 'SET' : 'NOT SET'}`);
                log(`KBank Consumer Secret: ${data.config_values?.kbank_consumer_secret ? 'SET' : 'NOT SET'}`);
                
            } catch (error) {
                log(`Failed to load config metadata: ${error.message}`, 'error');
            }
        }

        async function loadThunderConfig() {
            try {
                const response = await fetch('/admin/get-config-value?key=thunder_api_token');
                const data = await response.json();
                
                if (data.status === 'success' && data.value) {
                    document.getElementById('thunderToken').value = data.value;
                    log(`Thunder token loaded: ${data.value.substring(0, 20)}...`, 'success');
                } else {
                    document.getElementById('thunderToken').value = '';
                    document.getElementById('thunderToken').placeholder = 'Thunder token not configured';
                    log('Thunder token not configured', 'warning');
                }
            } catch (error) {
                log(`Failed to load Thunder token: ${error.message}`, 'error');
                document.getElementById('thunderToken').placeholder = 'Failed to load';
            }
        }

        async function loadKBankConfig() {
            try {
                const [idResponse, secretResponse] = await Promise.all([
                    fetch('/admin/get-config-value?key=kbank_consumer_id'),
                    fetch('/admin/get-config-value?key=kbank_consumer_secret')
                ]);
                
                const idData = await idResponse.json();
                const secretData = await secretResponse.json();
                
                if (idData.status === 'success' && idData.value) {
                    document.getElementById('kbankConsumerId').value = idData.value;
                    log(`KBank Consumer ID loaded: ${idData.value.substring(0, 20)}...`, 'success');
                } else {
                    document.getElementById('kbankConsumerId').value = '';
                    document.getElementById('kbankConsumerId').placeholder = 'Consumer ID not configured';
                    log('KBank Consumer ID not configured', 'warning');
                }
                
                if (secretData.status === 'success' && secretData.value) {
                    document.getElementById('kbankConsumerSecret').value = secretData.value;
                    log(`KBank Consumer Secret loaded: ${secretData.value.substring(0, 20)}...`, 'success');
                } else {
                    document.getElementById('kbankConsumerSecret').value = '';
                    document.getElementById('kbankConsumerSecret').placeholder = 'Consumer Secret not configured';
                    log('KBank Consumer Secret not configured', 'warning');
                }
                
            } catch (error) {
                log(`Failed to load KBank credentials: ${error.message}`, 'error');
                document.getElementById('kbankConsumerId').placeholder = 'Failed to load';
                document.getElementById('kbankConsumerSecret').placeholder = 'Failed to load';
            }
        }

        async function updateAPIStatus() {
            try {
                const response = await fetch('/admin/api-status');
                const data = await response.json();
                
                const statusHtml = `
                    <div class="mb-2">
                        <strong>Thunder API</strong>
                        <span class="badge ${data.thunder?.configured ? 'bg-success' : 'bg-danger'} ms-2">
                            ${data.thunder?.configured ? 'Configured' : 'Not Configured'}
                        </span>
                        <span class="badge ${data.thunder?.enabled ? 'bg-primary' : 'bg-secondary'} ms-1">
                            ${data.thunder?.enabled ? 'Enabled' : 'Disabled'}
                        </span>
                    </div>
                    <div class="mb-2">
                        <strong>KBank API</strong>
                        <span class="badge ${data.kbank?.configured ? 'bg-success' : 'bg-danger'} ms-2">
                            ${data.kbank?.configured ? 'Configured' : 'Not Configured'}
                        </span>
                        <span class="badge ${data.kbank?.enabled ? 'bg-primary' : 'bg-secondary'} ms-1">
                            ${data.kbank?.enabled ? 'Enabled' : 'Disabled'}
                        </span>
                    </div>
                    <hr>
                    <small class="text-muted">
                        Thunder Failures: ${data.thunder?.recent_failures || 0}<br>
                        KBank Failures: ${data.kbank?.recent_failures || 0}
                    </small>
                `;
                
                document.getElementById('apiStatusCard').innerHTML = statusHtml;
                
            } catch (error) {
                document.getElementById('apiStatusCard').innerHTML = `
                    <div class="alert alert-warning">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        Cannot load API status
                    </div>
                `;
            }
        }

        async function testThunderAPI() {
            const token = document.getElementById('thunderToken').value.trim();
            const fileInput = document.getElementById('thunderFile');
            
            if (!token) {
                log('Thunder API Token is required', 'error');
                return;
            }
            
            if (!fileInput.files[0]) {
                log('Please select an image file', 'error');
                return;
            }
            
            log('Testing Thunder API...', 'info');
            
            try {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                formData.append('token', token);
                
                const response = await fetch('/admin/test-thunder-api', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    log('Thunder API test successful!', 'success');
                    log(`Amount: ${result.data?.data?.amount_display || 'N/A'}`);
                    log(`Bank: ${result.data?.data?.sender_bank || 'N/A'} -> ${result.data?.data?.receiver_bank || 'N/A'}`);
                } else {
                    log(`Thunder API test failed: ${result.message}`, 'error');
                }
                
            } catch (error) {
                log(`Thunder API test error: ${error.message}`, 'error');
            }
        }

        async function testKBankOAuth() {
            const consumerId = document.getElementById('kbankConsumerId').value.trim();
            const consumerSecret = document.getElementById('kbankConsumerSecret').value.trim();
            
            if (!consumerId || !consumerSecret) {
                log('Consumer ID and Secret are required for OAuth test', 'error');
                return;
            }
            
            log('Testing KBank OAuth...', 'info');
            log(`Consumer ID: ${consumerId.substring(0, 20)}...`);
            
            try {
                const response = await fetch('/admin/test-kbank-oauth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        consumer_id: consumerId,
                        consumer_secret: consumerSecret
                    })
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    log('KBank OAuth test successful!', 'success');
                    log(`Token preview: ${result.data.token_preview}`);
                    log(`Token length: ${result.data.token_length} characters`);
                } else {
                    log(`KBank OAuth test failed: ${result.message}`, 'error');
                }
                
            } catch (error) {
                log(`KBank OAuth test error: ${error.message}`, 'error');
            }
        }

        async function testKBankAPI() {
            const consumerId = document.getElementById('kbankConsumerId').value.trim();
            const consumerSecret = document.getElementById('kbankConsumerSecret').value.trim();
            const bankId = document.getElementById('kbankBankId').value.trim();
            const transRef = document.getElementById('kbankTransRef').value.trim();
            
            if (!consumerId || !consumerSecret || !bankId || !transRef) {
                log('All KBank fields are required', 'error');
                return;
            }
            
            log('Testing KBank Slip Verification API...', 'info');
            log(`Bank ID: ${bankId}, Transaction Ref: ${transRef}`);
            
            try {
                const response = await fetch('/admin/test-kbank-api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        consumer_id: consumerId,
                        consumer_secret: consumerSecret,
                        bank_id: bankId,
                        trans_ref: transRef
                    })
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    log('KBank API test successful!', 'success');
                    log(`Amount: ${result.data?.data?.amount_display || 'N/A'}`);
                    log(`Sender: ${result.data?.data?.sender || 'N/A'}`);
                    log(`Receiver: ${result.data?.data?.receiver_name || 'N/A'}`);
                } else {
                    log(`KBank API test failed: ${result.message}`, 'error');
                }
                
            } catch (error) {
                log(`KBank API test error: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
