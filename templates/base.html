<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LINE OA Manager{% endblock %}</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #00B900;
            --secondary-color: #06C755;
            --dark-color: #2c3e50;
            --light-bg: #f8f9fa;
        }
        
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .main-container {
            background: white;
            min-height: 100vh;
            margin: 0 auto;
            max-width: 1400px;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }
        
        .navbar-top {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            padding: 1rem 2rem;
            color: white;
        }
        
        .sidebar {
            background: var(--dark-color);
            min-height: calc(100vh - 60px);
            padding: 0;
        }
        
        .sidebar .nav-link {
            color: rgba(255,255,255,0.8);
            padding: 15px 20px;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }
        
        .sidebar .nav-link:hover {
            background: rgba(255,255,255,0.1);
            color: white;
            border-left-color: var(--primary-color);
        }
        
        .sidebar .nav-link.active {
            background: rgba(0,185,0,0.2);
            color: white;
            border-left-color: var(--primary-color);
        }
        
        .sidebar .nav-link i {
            width: 25px;
            text-align: center;
            margin-right: 10px;
        }
        
        .content-area {
            padding: 30px;
            background: var(--light-bg);
            min-height: calc(100vh - 60px);
        }
        
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        
        .stat-card .stat-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .stat-card .stat-value {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--dark-color);
        }
        
        .stat-card .stat-label {
            color: #6c757d;
            font-size: 0.9rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 25px;
            padding: 10px 25px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,185,0,0.3);
        }
        
        .toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
        }
        
        .custom-toast {
            min-width: 300px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9998;
        }
        
        .loading-overlay.show {
            display: flex;
        }
    </style>
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="main-container">
        <!-- Top Navigation -->
        <nav class="navbar-top d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <i class="fab fa-line fa-2x me-3"></i>
                <h4 class="mb-0">LINE OA Manager</h4>
            </div>
            <div class="d-flex align-items-center">
                <span class="me-3">
                    <i class="fas fa-clock me-2"></i>
                    <span id="current-time"></span>
                </span>
                <button class="btn btn-light btn-sm" onclick="location.reload()">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </nav>
        
        <div class="d-flex">
            <!-- Sidebar -->
            <nav class="sidebar col-md-2">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/admin' %}active{% endif %}" href="/admin">
                            <i class="fas fa-dashboard"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if 'chat' in request.path %}active{% endif %}" href="/admin/chat-history">
                            <i class="fas fa-comments"></i> แชท
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if 'users' in request.path %}active{% endif %}" href="/admin/users">
                            <i class="fas fa-users"></i> ผู้ใช้งาน
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if 'settings' in request.path %}active{% endif %}" href="/admin/settings">
                            <i class="fas fa-cog"></i> ตั้งค่า
                        </a>
                    </li>
                </ul>
            </nav>
            
            <!-- Main Content -->
            <main class="content-area col-md-10">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    
    <!-- Toast Container -->
    <div class="toast-container"></div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="text-center">
            <div class="spinner-border text-light" style="width: 3rem; height: 3rem;">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="text-white mt-3">กำลังโหลด...</p>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Global Functions
        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('show');
        }
        
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('show');
        }
        
        function showToast(message, type = 'info') {
            const toastHtml = `
                <div class="toast custom-toast" role="alert">
                    <div class="toast-header bg-${type === 'error' ? 'danger' : type === 'success' ? 'success' : 'info'} text-white">
                        <strong class="me-auto">
                            ${type === 'error' ? '❌' : type === 'success' ? '✅' : 'ℹ️'} แจ้งเตือน
                        </strong>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
                    </div>
                    <div class="toast-body">
                        ${message}
                    </div>
                </div>
            `;
            
            const container = document.querySelector('.toast-container');
            container.insertAdjacentHTML('beforeend', toastHtml);
            
            const toastEl = container.lastElementChild;
            const toast = new bootstrap.Toast(toastEl);
            toast.show();
            
            setTimeout(() => toastEl.remove(), 5000);
        }
        
        // Update Time
        function updateTime() {
            const now = new Date();
            document.getElementById('current-time').textContent = 
                now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateTime();
            setInterval(updateTime, 60000);
        });
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
